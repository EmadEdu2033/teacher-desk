kind = "video"
previewPath = "/teacher-desk-marketing-video/"
title = "Teacher Desk — فيديو ترويجي"
version = "1.0.0"
id = "artifacts/teacher-desk-marketing-video"
router = "path"

[[integratedSkills]]
name = "video-js"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/teacher-desk-marketing-video/" ]
localPort = 25120

[services.development]
run = "pnpm --filter @workspace/teacher-desk-marketing-video run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teacher-desk-marketing-video", "run", "build" ]
publicDir = "artifacts/teacher-desk-marketing-video/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25120"
BASE_PATH = "/teacher-desk-marketing-video/"
