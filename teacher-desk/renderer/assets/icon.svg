<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="board" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"  stop-color="#2f9e6b"/>
      <stop offset="100%" stop-color="#1e7a4d"/>
    </linearGradient>
  </defs>
  <!-- Outer blue frame (also the app tile) -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#frame)"/>
  <rect x="20" y="20" width="472" height="472" rx="80" ry="80" fill="none" stroke="#1e3a8a" stroke-width="6" opacity="0.35"/>
  <!-- Green chalkboard -->
  <rect x="64" y="80" width="384" height="304" rx="22" ry="22" fill="url(#board)" stroke="#16653f" stroke-width="3"/>
  <!-- Chalk text strokes -->
  <rect x="104" y="138" width="220" height="14" rx="7" fill="#ffffff" opacity="0.92"/>
  <rect x="104" y="178" width="304" height="10" rx="5" fill="#ffffff" opacity="0.78"/>
  <rect x="104" y="210" width="180" height="10" rx="5" fill="#ffffff" opacity="0.70"/>
  <rect x="104" y="242" width="240" height="10" rx="5" fill="#ffffff" opacity="0.60"/>
  <rect x="104" y="274" width="140" height="10" rx="5" fill="#ffffff" opacity="0.55"/>
  <!-- Chalk tray + chalk pieces -->
  <rect x="56" y="384" width="400" height="28" rx="10" ry="10" fill="#0e3a8a"/>
  <rect x="80" y="392" width="60" height="12" rx="4" fill="#ffffff"/>
  <rect x="160" y="392" width="36" height="12" rx="4" fill="#fde68a"/>
  <!-- Easel legs -->
  <rect x="120" y="412" width="14" height="80" rx="6" fill="#1e3a8a"/>
  <rect x="378" y="412" width="14" height="80" rx="6" fill="#1e3a8a"/>
</svg>
